stages:
  - lint
  - test
  - test-coverage
  - build

lint:
  stage: lint
  image: golangci/golangci-lint:v2.6.1-alpine
  script:
    - golangci-lint run -v
  allow_failure: false

test:
  stage: test
  image: golang:1.25-alpine
  before_script:
    - apk add --no-cache git make gcc musl-dev
  script:
    - go mod download
    - go test -v -race ./...
  artifacts:
    expire_in: 7d
  allow_failure: false

test-coverage:
  stage: test-coverage
  image: golang:1.25-alpine
  before_script:
    - apk add --no-cache git bash
    - go mod download
  script:
    - |
      bash -euo pipefail <<'BASH'
      THRESHOLD=30
      SERVICES="order dispatch telemetry tracking base store"
      mkdir -p coverage

      for s in $SERVICES; do
        echo "==> Coverage for service: $s"

        OUT_FILE="coverage/${s}.log"
        OUT="$(go test -cover -covermode=atomic "./services/${s}/..." 2>&1 | tee "$OUT_FILE")"

        COV="$(printf '%s\n' "$OUT" \
          | sed -n 's/.*coverage: \([0-9.][0-9.]*\)% of statements.*/\1/p' \
          | awk '($1+0)>m{m=$1+0} END{if(NR==0)m=0; printf "%.1f", m}')"

        echo "Package coverage (${s}) = ${COV}%"

        if awk -v c="$COV" -v t="$THRESHOLD" 'BEGIN{exit (c<t)}'; then
          echo "OK: ${s} coverage >= ${THRESHOLD}%"
        else
          echo "Coverage for ${s} is below ${THRESHOLD}% (was ${COV}%)"
          exit 1
        fi
      done

      echo "All services coverage OK (>= ${THRESHOLD}%)."
      BASH
  artifacts:
    paths:
      - coverage/
    expire_in: 7d
  allow_failure: false

build:docker:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [ "" ]
  variables:
    KANIKO_CACHE_REPO: "${CI_REGISTRY_IMAGE}/kaniko-cache"
  before_script:
    - mkdir -p /kaniko/.docker
    - |
      AUTH="$(printf '%s:%s' "${CI_REGISTRY_USER}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')"
      printf '{"auths":{"%s":{"auth":"%s"}}}\n' "${CI_REGISTRY}" "${AUTH}" > /kaniko/.docker/config.json
  parallel:
    matrix:
      - SERVICE: "api"
        TARGET: "server"
      - SERVICE: "order"
        TARGET: "server"
      - SERVICE: "order"
        TARGET: "migrate"
      - SERVICE: "dispatch"
        TARGET: "server"
      - SERVICE: "dispatch"
        TARGET: "migrate"
      - SERVICE: "base"
        TARGET: "server"
      - SERVICE: "base"
        TARGET: "migrate"
      - SERVICE: "base"
        TARGET: "generate"
      - SERVICE: "store"
        TARGET: "server"
      - SERVICE: "store"
        TARGET: "migrate"
      - SERVICE: "store"
        TARGET: "generate"
      - SERVICE: "telemetry"
        TARGET: "server"
      - SERVICE: "telemetry"
        TARGET: "emulator"
      - SERVICE: "tracking"
        TARGET: "grpc-server"
      - SERVICE: "tracking"
        TARGET: "kafka-worker"

  script:
    - |
      set -euo pipefail

      DOCKERFILE="${CI_PROJECT_DIR}/services/${SERVICE}/Dockerfile"
      IMAGE_NAME="${CI_REGISTRY_IMAGE}/${SERVICE}-${TARGET}"
      TAG="${CI_COMMIT_SHORT_SHA}"

      DEST_ARGS="--destination ${IMAGE_NAME}:${TAG}"

      if [ "${CI_COMMIT_BRANCH:-}" = "main" ]; then
        DEST_ARGS="${DEST_ARGS} --destination ${IMAGE_NAME}:latest"
      fi

      /kaniko/executor \
        --context "${CI_PROJECT_DIR}" \
        --dockerfile "${DOCKERFILE}" \
        --target "${TARGET}" \
        --cache=true \
        --cache-repo "${KANIKO_CACHE_REPO}" \
        ${DEST_ARGS}
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG
