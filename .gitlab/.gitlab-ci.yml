stages:
  - lint
  - test
  - build

lint:
  stage: lint
  image: golangci/golangci-lint:v2.6.1-alpine
  script:
    - golangci-lint run -v
  allow_failure: false

test:
  stage: test
  image: golang:1.25-alpine
  before_script:
    - apk add --no-cache git make gcc musl-dev
  script:
    - go mod download
    - go test -v -race ./...
  artifacts:
    expire_in: 7d
  allow_failure: false

