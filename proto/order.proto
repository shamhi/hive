syntax = "proto3";

package order;
option go_package = "./gen/order";

service OrderService {
  rpc CreateOrder(CreateOrderRequest) returns (CreateOrderResponse);

  rpc GetOrder(GetOrderRequest) returns (GetOrderResponse);
}

message CreateOrderRequest {
  string user_id = 1;
  Location delivery_location = 2; // "Привезите мне СЮДА"
  repeated string items = 3;      // Список ID товаров
}

message Location {
  double lat = 1;
  double lon = 2;
}

message CreateOrderResponse {
  string order_id = 1;
  OrderStatus status = 2;
  string estimated_time = 3; // "15 min"
}

message GetOrderRequest {
  string order_id = 1;
}

message GetOrderResponse {
  string order_id = 1;
  OrderStatus status = 2;
  string drone_id = 3; // Если уже назначен
}

enum OrderStatus {
  CREATED = 0;
  SEARCHING_DRONE = 1; // Ищем дрона
  ASSIGNED = 2;        // Дрон летит на склад
  DELIVERING = 3;      // Дрон летит к клиенту
  COMPLETED = 4;
  FAILED = 5;
}
