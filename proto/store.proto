syntax = "proto3";

package store;
option go_package = "hive/gen/store";

import "common.proto";

service StoreService {
  rpc CreateStore(CreateStoreRequest) returns (CreateStoreResponse);
  rpc GetStoreLocation(GetStoreLocationRequest) returns (GetStoreLocationResponse);
  rpc FindNearest(FindNearestRequest) returns (FindNearestResponse);
}

message CreateStoreRequest {
  string name = 1;
  string address = 2;
  common.Location location = 3;
}

message CreateStoreResponse {
  string store_id = 1;
}

message GetStoreLocationRequest {
  string store_id = 1;
}

message GetStoreLocationResponse {
  common.Location location = 1;
}

message FindNearestRequest {
  common.Location delivery_location = 1;
}

message FindNearestResponse {
  string store_id = 1;
  bool found = 2;
  double distance_meters = 5;
}
