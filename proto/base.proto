syntax = "proto3";

package base;
option go_package = "hive/gen/base";

import "common.proto";

service BaseService {
  rpc CreateBase(CreateBaseRequest) returns (CreateBaseResponse);
  rpc GetBaseLocation(GetBaseLocationRequest) returns (GetBaseLocationResponse);
  rpc ListBases(ListBasesRequest) returns (ListBasesResponse);
}

message Base {
  string base_id = 1;
  string name = 2;
  string address = 3;
  common.Location location = 4;
}

message CreateBaseRequest {
  string name = 1;
  string address = 2;
  common.Location location = 3;
}

message CreateBaseResponse {
  string base_id = 1;
}

message GetBaseLocationRequest {
  string base_id = 1;
}

message GetBaseLocationResponse {
  string name = 1;
  string address = 2;
  common.Location location = 3;
}

message FindNearestRequest {
  common.Location drone_location = 1;
}

message FindNearestResponse {
  string base_id = 1;
  bool found = 2;
  double distance_meters = 5;
}

message ListBasesRequest {
  int32 offset = 1;
  int32 limit = 2;
}

message ListBasesResponse {
  repeated Base bases = 1;
}
