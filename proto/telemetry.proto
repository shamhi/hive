syntax = "proto3";

package telemetry;
option go_package = "hive/gen/telemetry";

service TelemetryService {
  rpc Link(stream DroneTelemetry) returns (stream ServerCommand);
  rpc SendCommand(SendCommandRequest) returns (SendCommandResponse);
}

enum DroneStatus {
  STATUS_UNKNOWN = 0;
  STATUS_FREE = 1;
  STATUS_BUSY = 2;
  STATUS_CHARGING = 3;
}

enum DroneEvent {
  EVENT_NONE = 0;
  EVENT_ARRIVED_AT_STORE = 1;
  EVENT_PICKED_UP_CARGO = 2;
  EVENT_ARRIVED_AT_CLIENT = 3;
  EVENT_DROPPED_CARGO = 4;
  EVENT_ARRIVED_AT_BASE = 5;
  EVENT_FULLY_CHARGED = 6;
}

enum DroneAction {
  ACTION_NONE = 0;
  ACTION_WAIT = 1;
  ACTION_FLY_TO = 2;
  ACTION_PICKUP_CARGO = 3;
  ACTION_DROP_CARGO = 4;
  ACTION_CHARGE = 5;
}

enum TargetType {
  TARGET_NONE = 0;
  TARGET_POINT = 1;
  TARGET_STORE = 2;
  TARGET_CLIENT = 3;
  TARGET_BASE = 4;
}

message Location {
  double lat = 1;
  double lon = 2;
}

message DroneTelemetry {
  string drone_id = 1;
  Location drone_location = 2;
  int32 battery = 3;
  DroneStatus status = 4;
  int64 timestamp = 5;
  DroneEvent event = 6;
}

message ServerCommand {
  string command_id = 1;
  DroneAction action = 2;
  Location target = 3;
  TargetType type = 4;
}

message SendCommandRequest {
  string drone_id = 1;
  DroneAction action = 2;
  Location target = 3;
  TargetType type = 4;
}

message SendCommandResponse {
  bool success = 1;
}
