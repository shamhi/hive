syntax = "proto3";

package tracking;
option go_package = "hive/gen/tracking";

import "common.proto";
import "telemetry.proto";

service TrackingService {
  rpc FindNearest(FindNearestRequest) returns (FindNearestResponse);
  rpc GetDroneLocation(GetDroneLocationRequest) returns (GetDroneLocationResponse);
  rpc SetStatus(SetStatusRequest) returns (SetStatusResponse);
  rpc ListDrones(ListDronesRequest) returns (ListDronesResponse);
}

message Drone {
  string drone_id = 1;
  common.Location drone_location = 2;
  double battery = 3;
  double speed_mps = 4;
  double consumption_per_meter = 5;
}

message FindNearestRequest {
  common.Location store_location = 1;
  double min_battery = 2;
  double radius_meters = 3;
}

message FindNearestResponse {
  bool found = 1;
  string drone_id = 2;
  double distance_meters = 4;
}

message GetDroneLocationRequest {
  string drone_id = 1;
}

message GetDroneLocationResponse {
  common.Location location = 1;
  double battery = 2;
  double speed_mps = 3;
  double consumption_per_meter = 4;
}

message SetStatusRequest {
  string drone_id = 1;
  telemetry.DroneStatus status = 2;
}

message SetStatusResponse {
  bool success = 1;
}

message ListDronesRequest {
  int32 offset = 1;
  int32 limit = 2;
}

message ListDronesResponse {
  repeated Drone drones = 1;
}
