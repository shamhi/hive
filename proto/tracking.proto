syntax = "proto3";

package tracking;
option go_package = "./gen/tracking";

service TrackingService {
  // Используется Dispatch Service'ом для поиска (Шаг Б)
  rpc FindNearest(FindNearestRequest) returns (FindNearestResponse);

  // Используется Dispatch Service'ом для блокировки дрона (Шаг В)
  // Чтобы исключить Race Condition
  rpc SetDroneStatus(SetStatusRequest) returns (SetStatusResponse);
}

message FindNearestRequest {
  double lat = 1;         // Координаты склада (точки старта)
  double lon = 2;
  int32 radius_meters = 3; // Например, искать в радиусе 2км
  int32 min_battery = 4;   // Фильтр: батарея > 20%
}

message FindNearestResponse {
  string drone_id = 1;
  double lat = 2;
  double lon = 3;
  double distance_meters = 4; // Расстояние до точки запроса
  bool found = 5;
}

message SetStatusRequest {
  string drone_id = 1;
  string status = 2; // FREE / BUSY
}

message SetStatusResponse {
  bool success = 1;
}
