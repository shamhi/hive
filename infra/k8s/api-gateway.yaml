apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: hive
  labels:
    app.kubernetes.io/name: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-gateway
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: api-gateway
        image: ghcr.io/your-org/hive/api-gateway-server:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        env:
        - name: ENV
          valueFrom:
            configMapKeyRef:
              name: hive-config
              key: ENV
        - name: SERVER_PORT
          value: "8080"
        - name: REQUEST_TIMEOUT
          valueFrom:
            configMapKeyRef:
              name: hive-config
              key: REQUEST_TIMEOUT
        - name: SHUTDOWN_TIMEOUT
          valueFrom:
            configMapKeyRef:
              name: hive-config
              key: SHUTDOWN_TIMEOUT
        - name: HTTP_READ_TIMEOUT
          valueFrom:
            configMapKeyRef:
              name: hive-config
              key: HTTP_READ_TIMEOUT
        - name: HTTP_READ_HEADER_TIMEOUT
          valueFrom:
            configMapKeyRef:
              name: hive-config
              key: HTTP_READ_HEADER_TIMEOUT
        - name: HTTP_WRITE_TIMEOUT
          valueFrom:
            configMapKeyRef:
              name: hive-config
              key: HTTP_WRITE_TIMEOUT
        - name: HTTP_IDLE_TIMEOUT
          valueFrom:
            configMapKeyRef:
              name: hive-config
              key: HTTP_IDLE_TIMEOUT
        - name: CORS_ALLOWED_ORIGINS
          valueFrom:
            configMapKeyRef:
              name: hive-config
              key: CORS_ALLOWED_ORIGINS
        - name: ORDER_ADDR
          valueFrom:
            configMapKeyRef:
              name: hive-config
              key: ORDER_ADDR
        - name: DISPATCH_ADDR
          valueFrom:
            configMapKeyRef:
              name: hive-config
              key: DISPATCH_ADDR
        - name: STORE_ADDR
          valueFrom:
            configMapKeyRef:
              name: hive-config
              key: STORE_ADDR
        - name: BASE_ADDR
          valueFrom:
            configMapKeyRef:
              name: hive-config
              key: BASE_ADDR
        - name: TRACKING_ADDR
          valueFrom:
            configMapKeyRef:
              name: hive-config
              key: TRACKING_ADDR
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        startupProbe:
          httpGet:
            path: /health
            port: http
          failureThreshold: 30
          periodSeconds: 2
        readinessProbe:
          httpGet:
            path: /health
            port: http
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: http
          periodSeconds: 15
          timeoutSeconds: 2
          failureThreshold: 3
      volumes:
      - name: tmp
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: hive
  labels:
    app.kubernetes.io/name: api-gateway
spec:
  selector:
    app.kubernetes.io/name: api-gateway
  ports:
  - name: http
    port: 80
    targetPort: http
