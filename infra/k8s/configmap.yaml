apiVersion: v1
kind: ConfigMap
metadata:
  name: hive-config
  namespace: hive
data:
  ENV: "prod"

  REQUEST_TIMEOUT: "15s"
  SHUTDOWN_TIMEOUT: "10s"

  HTTP_READ_TIMEOUT: "15s"
  HTTP_READ_HEADER_TIMEOUT: "5s"
  HTTP_WRITE_TIMEOUT: "30s"
  HTTP_IDLE_TIMEOUT: "60s"
  CORS_ALLOWED_ORIGINS: "https://app.example.com"

  ORDER_ADDR: "passthrough:///order:50051"
  DISPATCH_ADDR: "passthrough:///dispatch:50052"
  STORE_ADDR: "passthrough:///store:50053"
  BASE_ADDR: "passthrough:///base:50054"
  TRACKING_ADDR: "passthrough:///tracking:50055"
  TELEMETRY_ADDR: "passthrough:///telemetry:50056"

  POSTGRES_HOST: "postgresql.hive.svc.cluster.local"
  POSTGRES_PORT: "5432"

  REDIS_HOST: "redis.hive.svc.cluster.local"
  REDIS_PORT: "6379"

  KAFKA_BROKERS: "kafka.hive.svc.cluster.local:9092"
  DRONE_SEARCH_RADIUS: "10000"
  MIN_DRONE_BATTERY: "10"
  SEARCH_RADIUS: "10000"

  TELEMETRY_EVENTS_TOPIC: "telemetry-events"
  TELEMETRY_DATA_TOPIC: "telemetry-data"

  TASK_CREATED_TOPIC: "task-created"
  TASK_ASSIGNED_TOPIC: "task-assigned"
  TASK_STATUS_CHANGED_TOPIC: "task-status-changed"
