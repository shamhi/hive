apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemetry
  namespace: hive
  labels:
    app.kubernetes.io/name: telemetry
spec:
  # Telemetry keeps active drone gRPC streams in process memory.
  # Keep a single replica unless connection state is externalized.
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: telemetry
  template:
    metadata:
      labels:
        app.kubernetes.io/name: telemetry
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: telemetry
        image: ghcr.io/your-org/hive/telemetry-server:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 50056
          name: grpc
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        env:
        - name: ENV
          valueFrom:
            configMapKeyRef:
              name: hive-config
              key: ENV
        - name: GRPC_PORT
          value: "50056"
        - name: SHUTDOWN_TIMEOUT
          valueFrom:
            configMapKeyRef:
              name: hive-config
              key: SHUTDOWN_TIMEOUT
        - name: EVENTS_TOPIC
          valueFrom:
            configMapKeyRef:
              name: hive-config
              key: TELEMETRY_EVENTS_TOPIC
        - name: DATA_TOPIC
          valueFrom:
            configMapKeyRef:
              name: hive-config
              key: TELEMETRY_DATA_TOPIC
        - name: KAFKA_BROKERS
          valueFrom:
            configMapKeyRef:
              name: hive-config
              key: KAFKA_BROKERS
        - name: KAFKA_GROUP_ID
          value: "telemetry-service-group"
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        startupProbe:
          grpc:
            port: 50056
          failureThreshold: 30
          periodSeconds: 2
        readinessProbe:
          grpc:
            port: 50056
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3
        livenessProbe:
          grpc:
            port: 50056
          periodSeconds: 15
          timeoutSeconds: 2
          failureThreshold: 3
      volumes:
      - name: tmp
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: telemetry
  namespace: hive
  labels:
    app.kubernetes.io/name: telemetry
spec:
  selector:
    app.kubernetes.io/name: telemetry
  ports:
  - name: grpc
    port: 50056
    targetPort: grpc
