openapi: 3.0.1
info:
  title: Hive Drone Delivery API
  description: API Gateway для взаимодействия клиентов с системой доставки дронами.
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Local Development

paths:
  # ---------------------------------------------------------------------------
  # ORDERS API
  # ---------------------------------------------------------------------------
  /api/v1/orders:
    post:
      summary: Создать новый заказ
      operationId: createOrder
      tags:
        - Orders
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '201':
          description: Заказ успешно создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateOrderResponse'
        '400':
          description: Ошибка валидации (неверные координаты, пустой список)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Внутренняя ошибка сервера

  /api/v1/orders/{id}:
    get:
      summary: Получить статус заказа
      description: Возвращает статус заказа и, если назначен дрон, его текущее местоположение.
      operationId: getOrder
      tags:
        - Orders
      parameters:
        - name: id
          in: path
          required: true
          description: ID заказа (UUID)
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Информация о заказе
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetOrderResponse'
        '404':
          description: Заказ не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

